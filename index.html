<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-Boy Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-800 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="main-container">
        <div class="emulator-column flex flex-col items-center">
            <div class="gameboy gameboy-panel p-6 space-y-4">
                <div class="screen-border p-8 pb-12 relative">
                    <div class="screen-aspect">
                        <canvas id="gameboy-screen"></canvas>
                        <div id="screen-splash" class="screen-splash">
                            <p class="screen-splash-title">JS-Boy Emulator</p>
                            <p class="screen-splash-subtitle">Bitte ROM laden</p>
                        </div>
                    </div>
                    <p class="text-center text-red-500 text-xs absolute left-1/2 -translate-x-1-2 bottom-5 font-mono">BATTERY</p>
                </div>

                <h1 class="text-2xl text-center font-bold text-blue-800" style="font-family: 'Press Start 2P', sans-serif;">JS-Boy</h1>

                <div class="grid grid-cols-2 gap-4 items-center">
                    <div class="flex justify-center">
                        <div class="d-pad">
                            <div id="btn-up" data-key="UP" class="button-overlay" style="top:0; left:35%; width:30%; height:35%;"></div>
                            <div id="btn-down" data-key="DOWN" class="button-overlay" style="bottom:0; left:35%; width:30%; height:35%;"></div>
                            <div id="btn-left" data-key="LEFT" class="button-overlay" style="top:35%; left:0; width:35%; height:30%;"></div>
                            <div id="btn-right" data-key="RIGHT" class="button-overlay" style="top:35%; right:0; width:35%; height:30%;"></div>
                        </div>
                    </div>

                    <div class="flex justify-center items-center gap-4 action-buttons">
                        <div id="btn-b" data-key="B" class="button">B</div>
                        <div id="btn-a" data-key="A" class="button">A</div>
                    </div>
                </div>

                <div class="flex justify-center gap-6 system-buttons">
                    <div id="btn-select" data-key="SELECT" class="button flex items-center justify-center">SELECT</div>
                    <div id="btn-start" data-key="START" class="button flex items-center justify-center">START</div>
                </div>

                <div class="pt-4 text-center">
                    <label for="rom-input" class="cursor-pointer bg-gray-600 text-white py-2 px-4 rounded-lg hover:bg-gray-700 transition">
                        ROM laden...
                    </label>
                    <input type="file" id="rom-input" class="hidden" accept=".gb,.gbc">
                    <p id="rom-title" class="text-xs text-gray-700 mt-2 h-4"></p>
                </div>
            </div>

            <div class="debug-info debug-panel p-4 mt-4 rounded-lg">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-lg font-bold text-gray-400">CPU Status</h3>
                    <button id="mute-btn" class="bg-gray-600 text-white p-2 rounded-full hover:bg-gray-500 transition focus:outline-none">
                        <svg id="speaker-icon-muted" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                        <svg id="speaker-icon-unmuted" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm">
                    <span>PC: <span id="reg-pc">0000</span></span>
                    <span>SP: <span id="reg-sp">0000</span></span>
                    <span>AF: <span id="reg-af">0000</span></span>
                    <span>BC: <span id="reg-bc">0000</span></span>
                    <span>DE: <span id="reg-de">0000</span></span>
                    <span>HL: <span id="reg-hl">0000</span></span>
                    <span class="col-span-2">Flags (ZNHC): <span id="flags">----</span></span>
                </div>
            </div>
        </div>

        <div class="info-box-container">
            <div class="info-box bg-gray-700 text-gray-300">
                <h3 class="text-base font-bold text-gray-400 mb-3 text-center" style="font-family: 'Press Start 2P', sans-serif;">Speicherverwaltung</h3>
                <div class="grid grid-cols-2 gap-2">
                    <label for="import-save-input" id="import-save-btn" class="info-button">Save importieren (.sav)</label>
                    <input type="file" id="import-save-input" class="hidden" accept=".sav">
                    <button id="export-save-btn" class="info-button">Save exportieren (.sav)</button>
                </div>
                <p id="save-status" class="text-xs text-center mt-3 h-4 text-green-400"></p>
            </div>

            <div class="info-box bg-gray-700 text-gray-300 text-xs">
                <h3 class="text-base font-bold text-gray-400 mb-2 text-center" style="font-family: 'Press Start 2P', sans-serif;">Steuerung</h3>
                <div class="grid grid-cols-2 gap-x-4">
                    <div><p class="font-bold">Steuerkreuz:</p><p>&uarr; &darr; &larr; &rarr; / WASD</p></div>
                    <div><p class="font-bold"><p>A: (Z/Y/J) / B: (X/K)</p></div>
                    <div class="col-span-2 mt-2"><p><span class="font-bold">START:</span> Enter</p><p><span class="font-bold">SELECT:</span> R-Shift</p></div>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
